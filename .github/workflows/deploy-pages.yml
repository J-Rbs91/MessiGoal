name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Configuration de Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Construction des données (agrégation + validation)
        run: node scripts/build-data.js

      - name: Assemblage du site statique
        run: |
          mkdir -p _site
          cp public/index.html public/styles.css public/app.js _site/
          cp public/manifest.webmanifest public/sw.js _site/
          cp -r public/icons _site/icons
          cp public/goals.json _site/goals.json
          touch _site/.nojekyll

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Téléversement de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement vers GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
